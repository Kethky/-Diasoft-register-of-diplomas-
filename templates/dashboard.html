<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДипломРеестр - Проверка дипломов</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>
<body>
    <header>
        <div class="logo">
            <span>ДипломРеестр</span>
            <img id="logoImg" src="/static/png/2.png" alt="Логотип">
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <img src="/static/png/moon.png" alt="Тёмная тема" id="themeIcon">
            </button>
            <a href="/index" class="login-header-btn">Войти</a>
        </div>
    </header>
    <main>
        <div class="card">
            <h2>Поиск диплома</h2>
            <div class="mode-switch">
                <button id="btn-num" class="mode-btn active" onclick="setMode('num')">По номеру</button>
                <button id="btn-qr" class="mode-btn" onclick="setMode('qr')">Через QR</button>
            </div>
            <div id="input-num">
                <label class="label">Учебное заведение</label>
                <div class="relative">
                    <div class="uni-select-trigger" id="uniTrigger" onclick="toggleDrop(event)">
                        <span id="selectedUniName">Выберите ВУЗ...</span><span>▼</span>
                    </div>
                    <div class="uni-dropdown" id="uniDrop">
                        <div style="padding: 12px; text-align: center; color: var(--text-secondary);">Загрузка...</div>
                    </div>
                </div>
                <div id="selected-box" class="selected-view" style="display:none">
                    <div><b id="res-name"></b><span id="res-code" style="font-size:12px; color:var(--text-secondary); margin-left:8px;"></span></div>
                    <button onclick="resetUni()" style="color:var(--primary); background:none; border:1px solid; border-radius:6px; cursor:pointer; padding:4px 12px;">Изменить</button>
                </div>
                <label class="label">Номер диплома</label>
                <input type="text" id="dip-num" placeholder="АБ 1234567">
            </div>
            <div id="input-qr" class="hidden">
                <input type="file" id="file-in" class="hidden" accept="image/*" onchange="handleFile(event)">
                <div class="qr-area" onclick="triggerFile()">
                    <div id="qr-idle"><b>Нажмите для загрузки QR-кода</b></div>
                    <div id="qr-active" class="hidden"><br><b id="fname"></b><br><button onclick="removeFile(event)" style="color:red; border:none; background:none; cursor:pointer; margin-top:10px;">Отменить</button></div>
                </div>
            </div>
            <button class="submit-btn" id="checkBtn" onclick="handleCheck()">Проверить в реестре</button>
            <div id="result" class="result hidden"></div>
        </div>
    </main>
    <div class="hotkey-hint">
        ⏎ Enter - проверить | ⎋ Esc - сбросить
    </div>
    <script>
        let selectedUniCode = null;
        let selectedUniName = null;
        let universities = [];
        let currentMode = 'num';
        
        // Тема с картинками
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const themeIcon = document.getElementById('themeIcon');
            const logoImg = document.getElementById('logoImg');
            
            if (document.body.classList.contains('dark')) {
                themeIcon.src = '/static/png/sun.png';
                themeIcon.alt = 'Светлая тема';
                logoImg.src = '/static/png/1.png';
                document.body.style.backgroundImage = "url('/static/png/darkbg.png')";
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.src = '/static/png/moon.png';
                themeIcon.alt = 'Тёмная тема';
                logoImg.src = '/static/png/2.png';
                document.body.style.backgroundImage = "url('/static/png/lightbg.png')";
                localStorage.setItem('theme', 'light');
            }
        }
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeIcon = document.getElementById('themeIcon');
            const logoImg = document.getElementById('logoImg');
            
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeIcon.src = '/static/png/sun.png';
                themeIcon.alt = 'Светлая тема';
                logoImg.src = '/static/png/1.png';
                document.body.style.backgroundImage = "url('/static/png/darkbg.png')";
            } else {
                document.body.classList.remove('dark');
                themeIcon.src = '/static/png/moon.png';
                themeIcon.alt = 'Тёмная тема';
                logoImg.src = '/static/png/2.png';
                document.body.style.backgroundImage = "url('/static/png/lightbg.png')";
            }
        }
        
        // Загрузка списка вузов из базы данных
        function loadUniversities() {
            fetch('/api/universities')
                .then(response => response.json())
                .then(data => {
                    universities = data;
                    const drop = document.getElementById('uniDrop');
                    if (!data.length) {
                        drop.innerHTML = '<div style="padding: 12px; text-align: center; color: var(--text-secondary);">Нет вузов в базе</div>';
                        return;
                    }
                    drop.innerHTML = '';
                    data.forEach(uni => {
                        const div = document.createElement('div');
                        div.className = 'uni-item';
                        div.innerHTML = `<span>${uni.name}</span><span class="uni-item-code">Код: ${uni.code}</span>`;
                        div.onclick = () => selectUni(uni.code, uni.name);
                        drop.appendChild(div);
                    });
                })
                .catch(error => {
                    console.error('Ошибка загрузки вузов:', error);
                    document.getElementById('uniDrop').innerHTML = '<div style="padding: 12px; text-align: center; color: red;">Ошибка загрузки</div>';
                });
        }
        
        function selectUni(code, name) {
            selectedUniCode = code;
            selectedUniName = name;
            document.getElementById('uniTrigger').style.display = 'none';
            document.getElementById('selected-box').style.display = 'flex';
            document.getElementById('res-name').innerHTML = name;
            document.getElementById('res-code').innerHTML = `Код: ${code}`;
            document.getElementById('uniDrop').classList.remove('show');
        }
        
        function resetUni() {
            selectedUniCode = null;
            selectedUniName = null;
            document.getElementById('uniTrigger').style.display = 'flex';
            document.getElementById('selected-box').style.display = 'none';
        }
        
        function toggleDrop(e) {
            e.stopPropagation();
            document.getElementById('uniDrop').classList.toggle('show');
        }
        
        function setMode(m) {
            currentMode = m;
            const isNum = m === 'num';
            document.getElementById('btn-num').classList.toggle('active', isNum);
            document.getElementById('btn-qr').classList.toggle('active', !isNum);
            document.getElementById('input-num').classList.toggle('hidden', !isNum);
            document.getElementById('input-qr').classList.toggle('hidden', isNum);
            document.getElementById('result').classList.add('hidden');
        }
        
        function triggerFile() {
            if (document.getElementById('qr-active').classList.contains('hidden')) {
                document.getElementById('file-in').click();
            }
        }
        
        function handleFile(e) {
            const f = e.target.files[0];
            if (f) {
                document.getElementById('qr-idle').classList.add('hidden');
                const a = document.getElementById('qr-active');
                a.classList.remove('hidden');
                a.style.display = 'block';
                document.getElementById('fname').innerText = f.name;
            }
        }
        
        function removeFile(e) {
            e.stopPropagation();
            const fileInput = document.getElementById('file-in');
            fileInput.value = '';
            document.getElementById('qr-idle').classList.remove('hidden');
            const qrActive = document.getElementById('qr-active');
            qrActive.classList.add('hidden');
            qrActive.style.display = 'none';
            document.getElementById('fname').innerText = '';
        }
        
        function resetForm() {
            resetUni();
            document.getElementById('dip-num').value = '';
            const fileInput = document.getElementById('file-in');
            if (fileInput) {
                fileInput.value = '';
                document.getElementById('qr-idle')?.classList.remove('hidden');
                const qrActive = document.getElementById('qr-active');
                if (qrActive) {
                    qrActive.classList.add('hidden');
                    qrActive.style.display = 'none';
                }
                document.getElementById('fname').innerText = '';
            }
            const resultDiv = document.getElementById('result');
            resultDiv.classList.add('hidden');
            document.getElementById('uniDrop').classList.remove('show');
        }
        
        async function handleCheck() {
            if (currentMode === 'num') {
                await checkDiplomaByNumber();
            } else {
                await checkDiplomaByQR();
            }
        }
        
        async function checkDiplomaByNumber() {
            const diplomaNumber = document.getElementById('dip-num').value.trim();
            
            if (!selectedUniCode) {
                alert('Выберите ВУЗ');
                return;
            }
            if (!diplomaNumber) {
                alert('Введите номер диплома');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden', 'valid', 'invalid');
            resultDiv.innerHTML = '<div class="loading"></div> Проверка...';
            
            try {
                const response = await fetch('/api/search_diploma', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        university_code: selectedUniCode,
                        diploma_number: diplomaNumber
                    })
                });
                const data = await response.json();
                
                if (data.expired) {
                    resultDiv.className = 'result invalid';
                    resultDiv.innerHTML = `❌ ${data.message}`;
                } else if (data.valid) {
    resultDiv.className = 'result valid';
    resultDiv.innerHTML = `
    ${data.message}
    <div class="result-details">
        Статус: диплом найден в реестре
    </div>
    <button class="report-btn"
            onclick="reportSuspiciousAction(${selectedUniCode}, '${String(diplomaNumber).replace(/'/g, "\\'")}')">
        Сообщить о подозрительных действиях
    </button>
    `;
                } else if (data.found === false) {
                    resultDiv.className = 'result invalid';
                    resultDiv.innerHTML = `${data.message}`;
                } else {
                    resultDiv.className = 'result invalid';
                    resultDiv.innerHTML = `${data.message}`;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                resultDiv.className = 'result invalid';
                resultDiv.innerHTML = 'Ошибка при проверке диплома';
            }
        }
        
        async function checkDiplomaByQR() {
    const fileInput = document.getElementById('file-in');
    const file = fileInput.files[0];

    if (!file) {
        alert('Выберите файл с QR-кодом');
        return;
    }

    const resultDiv = document.getElementById('result');
    resultDiv.className = 'result';
    resultDiv.classList.remove('hidden', 'valid', 'invalid');
    resultDiv.innerHTML = '<div class="loading"></div> Распознавание QR-кода...';

    const formData = new FormData();
    formData.append('file', file);

    try {
        const scanResponse = await fetch('/api/scan_qr', {
            method: 'POST',
            headers: {
                'X-CSRF-Token': '{{ csrf_token }}'
            },
            body: formData
        });

        const scanData = await scanResponse.json();

        if (!scanData.success) {
            resultDiv.className = 'result invalid';
            resultDiv.innerHTML = `${scanData.message}`;
            return;
        }

        resultDiv.innerHTML = '<div class="loading"></div> Поиск диплома в реестре...';

        const uni = universities.find(u => u.code === scanData.university_code);
        if (uni) {
            selectUni(uni.code, uni.name);
        }

        let searchResponse;
        let searchData;

        if (scanData.temp_token) {
            searchResponse = await fetch('/api/search_diploma', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    temp_token: scanData.temp_token
                })
            });
        } else {
            searchResponse = await fetch('/api/search_diploma', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    university_code: scanData.university_code,
                    diploma_number: scanData.diploma_number
                })
            });
        }

        searchData = await searchResponse.json();

        if (searchData.expired) {
            resultDiv.className = 'result invalid';
            resultDiv.innerHTML = `❌ ${searchData.message}`;
        } else if (searchData.valid) {
            resultDiv.className = 'result valid';
            resultDiv.innerHTML = `
                ${searchData.message}
                <div class="result-details">
                    Статус: диплом найден в реестре
                </div>
                <button class="report-btn"
                        onclick="reportSuspiciousAction(${scanData.university_code}, '${String(scanData.diploma_number).replace(/'/g, "\\'")}')">
                    Сообщить о подозрительных действиях
                </button>
            `;
        } else {
            resultDiv.className = 'result invalid';
            resultDiv.innerHTML = `${searchData.message}`;
        }

    } catch (error) {
        console.error('Ошибка:', error);
        resultDiv.className = 'result invalid';
        resultDiv.innerHTML = 'Ошибка при обработке QR-кода';
    }
}
        // Обработка токена из URL (временная ссылка)
        function handleTokenFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) return;

    const resultDiv = document.getElementById('result');
    resultDiv.className = 'result';
    resultDiv.classList.remove('hidden', 'valid', 'invalid');
    resultDiv.innerHTML = '<div class="loading"></div> Проверка диплома по временной ссылке...';

    fetch('/api/search_diploma', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': '{{ csrf_token }}'
        },
        body: JSON.stringify({ temp_token: token })
    })
    .then(response => response.json())
    .then(data => {
        if (data.expired) {
            resultDiv.className = 'result invalid';
            resultDiv.innerHTML = `❌ ${data.message}`;
        } else if (data.valid) {
            resultDiv.className = 'result valid';
            resultDiv.innerHTML = `
                ${data.message}
                <div class="result-details">
                    Статус: диплом найден в реестре
                </div>
            `;
        } else {
            resultDiv.className = 'result invalid';
            resultDiv.innerHTML = `${data.message}`;
        }
    })
    .catch(error => {
        console.error('Ошибка:', error);
        resultDiv.className = 'result invalid';
        resultDiv.innerHTML = 'Ошибка при проверке диплома';
    });

    window.history.replaceState({}, document.title, window.location.pathname);
}
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function handleUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const uniCode = urlParams.get('uni_code');
            const dipNum = urlParams.get('dip_num');
            
            if (uniCode && dipNum) {
                fetch('/api/universities')
                    .then(response => response.json())
                    .then(data => {
                        const uni = data.find(u => u.code == uniCode);
                        if (uni) {
                            selectUni(uni.code, uni.name);
                            document.getElementById('dip-num').value = dipNum;
                            setTimeout(() => checkDiplomaByNumber(), 500);
                        }
                    });
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleCheck();
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                resetForm();
            }
        });
        
        window.onclick = function() {
            document.getElementById('uniDrop').classList.remove('show');
        }
        
        loadTheme();
        loadUniversities();
        handleUrlParams();
        handleTokenFromUrl();
        
        async function reportSuspiciousAction(universityCode, diplomaNumber) {
    const comment = prompt('Опишите подозрительные действия:');
    if (comment === null) return;

    const trimmedComment = comment.trim();
    if (!trimmedComment) {
        alert('Введите описание подозрительных действий');
        return;
    }

    try {
        const response = await fetch('/api/report_suspicious_activity', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-Token': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                university_code: universityCode,
                diploma_number: diplomaNumber,
                comment: trimmedComment
            })
        });

        const data = await response.json();

        if (data.success) {
            alert('Сообщение о подозрительных действиях отправлено');
        } else {
            alert(data.message || 'Ошибка при отправке сообщения');
        }
    } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка при отправке сообщения');
    }
}
    </script>
</body>
</html>
