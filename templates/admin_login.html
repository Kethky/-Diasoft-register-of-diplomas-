<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>Вход администратора</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">

</head>
<body>
  <div class="wrap">
    <div class="card">
      <button class="theme-toggle" type="button" onclick="toggleTheme()">
        <img src="/static/png/moon.png" alt="Тёмная тема" id="themeIcon">
      </button>
      <h1>Админ-панель</h1>
      <div class="muted">Войдите под учетной записью администратора.</div>
      <form id="loginForm">
        <label for="login">Логин</label>
        <input id="login" name="login" autocomplete="username" required>

        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button class="primary" type="submit">Войти</button>
      </form>
      <a href="/index" class="exit-link">Выйти</a>
      <div class="msg" id="msg"></div>
      <div class="muted" style="margin-top: 18px; font-size: 14px;">
        Для локального запуска по умолчанию: <b>admin</b> / <b>admin123!</b>.<br>
        Для продакшена обязательно задайте <code>ADMIN_LOGIN</code> и <code>ADMIN_PASSWORD</code> или <code>ADMIN_PASSWORD_HASH</code>.
      </div>
    </div>
  </div>

  <script>

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const themeIcon = document.getElementById('themeIcon');
      if (document.body.classList.contains('dark')) {
        themeIcon.src = '/static/png/sun.png';
        themeIcon.alt = 'Светлая тема';
        localStorage.setItem('theme', 'dark');
      } else {
        themeIcon.src = '/static/png/moon.png';
        themeIcon.alt = 'Тёмная тема';
        localStorage.setItem('theme', 'light');
      }
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem('theme');
      const themeIcon = document.getElementById('themeIcon');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark');
        themeIcon.src = '/static/png/sun.png';
        themeIcon.alt = 'Светлая тема';
      } else {
        document.body.classList.remove('dark');
        themeIcon.src = '/static/png/moon.png';
        themeIcon.alt = 'Тёмная тема';
      }
    }

    loadTheme();

    const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.textContent = '';

      const payload = {
        login: document.getElementById('login').value.trim(),
        password: document.getElementById('password').value
      };

      const response = await fetch('/login/admin', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': csrfToken
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (response.ok && data.success) {
        window.location.href = data.redirect || '/admin';
        return;
      }

      msg.textContent = data.message || data.error || 'Ошибка входа';
    });
  </script>
</body>
</html>
