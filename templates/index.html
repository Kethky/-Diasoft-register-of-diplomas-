<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>
    <div class="card">
        <button class="theme-toggle" onclick="toggleTheme()">
            <img src="/static/png/moon.png" alt="Тёмная тема" id="themeIcon">
        </button>

        <a href="/" class="close-btn">&times;</a>

        <div id="main-menu">
            <h1>Войти</h1>

            <div class="btn-list">
                <button class="btn student" id="student-btn" onclick="showForm('student-form')">
                    Как студент
                </button>

                <button class="btn uni" id="uni-btn" onclick="showForm('uni-form')">
                    Как ВУЗ
                </button>

                <a href="/admin/login" class="btn admin">
                    В админ-панель
                </a>
            </div>

            <p class="hint">Выберите роль для входа</p>

            <div class="hotkey-hint">
                ⎋ Esc: вернуться на главную
            </div>
        </div>

        <div id="student-form" class="hidden">
            <h1>Студент</h1>
            <div class="form-container">
                <input type="text" id="student-diploma" placeholder="Номер диплома" autocomplete="off">
                <input type="text" id="student-secret" placeholder="Код доступа" autocomplete="off">
                <div id="student-error" class="error-msg"></div>
                <button class="btn submit" id="student-submit" onclick="loginStudent()">Войти</button>
            </div>
            <span class="back-link" onclick="showMain()">← Назад</span>
            <div class="hotkey-hint">
                ⏎ Enter: переход к следующему полю / вход | ⌫ Backspace: в пустом поле - назад | ⎋ Esc: назад
            </div>
        </div>

        <div id="uni-form" class="hidden">
            <h1>ВУЗ</h1>
            <div class="form-container">
                <input type="text" id="uni-login" placeholder="Логин" autocomplete="off">
                <input type="password" id="uni-password" placeholder="Пароль">
                <div id="uni-error" class="error-msg"></div>
                <button class="btn submit" id="uni-submit" onclick="loginUniversity()">Войти</button>
            </div>
            <span class="back-link" onclick="showMain()">← Назад</span>
            <div class="hotkey-hint">
                ⏎ Enter: переход к следующему полю / вход | ⌫ Backspace: в пустом поле - назад | ⎋ Esc: назад
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const themeIcon = document.getElementById('themeIcon');
            if (document.body.classList.contains('dark')) {
                themeIcon.src = '/static/png/sun.png';
                themeIcon.alt = 'Светлая тема';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.src = '/static/png/moon.png';
                themeIcon.alt = 'Тёмная тема';
                localStorage.setItem('theme', 'light');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeIcon = document.getElementById('themeIcon');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeIcon.src = '/static/png/sun.png';
                themeIcon.alt = 'Светлая тема';
            } else {
                document.body.classList.remove('dark');
                themeIcon.src = '/static/png/moon.png';
                themeIcon.alt = 'Тёмная тема';
            }
        }

        const studentDiploma = document.getElementById('student-diploma');
        const studentSecretInput = document.getElementById('student-secret');
        const studentError = document.getElementById('student-error');

        const uniLogin = document.getElementById('uni-login');
        const uniPassword = document.getElementById('uni-password');
        const uniError = document.getElementById('uni-error');

        function showForm(id) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            studentError.classList.remove('show');
            uniError.classList.remove('show');

            if (id === 'student-form') {
                setTimeout(() => studentDiploma.focus(), 100);
            }
            if (id === 'uni-form') {
                setTimeout(() => uniLogin.focus(), 100);
            }
        }

        function showMain() {
            document.getElementById('student-form').classList.add('hidden');
            document.getElementById('uni-form').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            studentError.classList.remove('show');
            uniError.classList.remove('show');
        }

        function loginStudent() {
            const diploma = studentDiploma.value.trim();
            const studentSecret = studentSecretInput.value.trim();

            studentError.classList.remove('show');

            if (!diploma || !studentSecret) {
                studentError.innerHTML = 'Заполните все поля';
                studentError.classList.add('show');
                return;
            }

            fetch('/login/student', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    diploma_number: diploma,
                    student_secret: studentSecret
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    studentError.innerHTML = data.message;
                    studentError.classList.add('show');
                }
            });
        }

        function loginUniversity() {
            const login = uniLogin.value.trim();
            const password = uniPassword.value;

            uniError.classList.remove('show');

            if (!login || !password) {
                uniError.innerHTML = 'Заполните все поля';
                uniError.classList.add('show');
                return;
            }

            fetch('/login/university', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': '{{ csrf_token }}'
                },
                body: JSON.stringify({ login: login, password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    uniError.innerHTML = data.message;
                    uniError.classList.add('show');
                }
            });
        }

        studentDiploma.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                studentSecretInput.focus();
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                showMain();
            }
        });

        studentSecretInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginStudent();
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                showMain();
            }
            if (e.key === 'Backspace' && studentSecretInput.value === '') {
                e.preventDefault();
                studentDiploma.focus();
            }
        });

        uniLogin.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                uniPassword.focus();
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                showMain();
            }
        });

        uniPassword.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginUniversity();
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                showMain();
            }
            if (e.key === 'Backspace' && uniPassword.value === '') {
                e.preventDefault();
                uniLogin.focus();
            }
        });

        document.addEventListener('keydown', function(e) {
            const mainMenu = document.getElementById('main-menu');
            if (e.key === 'Escape' && !mainMenu.classList.contains('hidden')) {
                e.preventDefault();
                window.location.href = '/';
            }
        });

        loadTheme();
    </script>
</body>
</html>
